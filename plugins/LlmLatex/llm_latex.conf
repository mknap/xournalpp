# LLM to LaTeX plugin configuration
#
# This file is read from the plugin config directory at runtime:
#   app.getFolder("config")/llm_latex.conf
#
# Precedence:
# 1) Environment variables override file values
# 2) File values override built-in defaults
#
# Environment variable equivalents:
#   api_type   -> XOJ_LLM_LATEX_API_TYPE
#   endpoint   -> XOJ_LLM_LATEX_ENDPOINT
#   api_key    -> XOJ_LLM_LATEX_API_KEY
#   model      -> XOJ_LLM_LATEX_MODEL
#   prompt_file-> XOJ_LLM_LATEX_PROMPT_FILE
#   fast_crop  -> XOJ_LLM_LATEX_FAST_CROP
#   timeout_sec-> XOJ_LLM_LATEX_TIMEOUT_SEC
#   show_debug_dialogs -> XOJ_LLM_LATEX_SHOW_DEBUG_DIALOGS

# Required: API provider type.
# Supported values:
#   openai  -> POST /v1/chat/completions
#   ollama  -> POST /api/chat
api_type=ollama

# Required: base URL or endpoint for the selected API type.
# Examples:
#   openai -> https://api.openai.com
#   openai -> https://api.openai.com/v1
#   ollama -> http://localhost:11434
#   ollama -> http://localhost:11434/api/chat
endpoint=

# Optional: Bearer token (without "Bearer ") for Authorization header
# Leave empty if your endpoint does not require authentication
api_key=

# Optional: model identifier forwarded to your endpoint payload
# Example: gpt-4.1-mini
model=qwen3.5:9b

# Optional: prompt file sent to the LLM.
# Relative paths are resolved against the plugin config folder.
# Create multiple prompt files here and switch between them by changing this value.
prompt_file=prompt-default.txt

# Optional: use a fast single-pass crop (xy) instead of 4-way heuristic crop.
# This removes several ImageMagick calls and is usually much faster.
# Values: true/false, yes/no, on/off, 1/0
# Default: true
fast_crop=true

# Optional: width (in pixels) used for selection image rendering.
# Lower values usually speed up conversion and reduce request payload size.
# Example: 1400
selection_image_width=1000

# Optional: crop padding around the selection bounds in document units.
# Smaller values can slightly reduce crop and payload size.
selection_crop_padding=8

# Optional: request timeout in seconds
# Default is 15, minimum enforced by plugin is 2
timeout_sec=45

# Optional: show request/response debug popup after each call
# Values: true/false, yes/no, on/off, 1/0
# Default: false
show_debug_dialogs=false
